services:
  - type: web
    name: taskm-backend
    runtime: node
    plan: free
    repo: https://github.com/adityaragaai/TaskMBackend
    branch: main
    buildCommand: npm install --include=dev && npm run build && ls -la dist/
    startCommand: node bootstrap.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
